<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myskin crawl dashboard</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/static/brand/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/static/brand/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/static/brand/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.36/dist/codicon.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/crawl/static/dashboard.css">
</head>
<body>
  <header>
    <div class="brand">
      <img class="brand-logo" src="/static/brand/myskin-logo.png" alt="" width="40" height="40">
      <h1>myskin crawl dashboard</h1>
    </div>
    <div class="auth">
      <input id="token" type="password" placeholder="API token" size="24" autocomplete="off">
      <button id="saveToken" type="button">Save token</button>
      <button id="startCrawl" type="button">Start crawl</button>
    </div>
  </header>
  <main>
    <div id="error"></div>
    <div class="status-row">
      <span id="statePill" class="pill idle">idle</span>
      <span id="runMeta" class="meta"></span>
    </div>
    <div id="compactBar" class="compact-bar"></div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
    <h2 class="events-heading">Recent pages</h2>
    <div class="events" id="events"></div>
    <h2 class="events-heading">Queue tail</h2>
    <div class="events queue-tail" id="queueTail"></div>
  </main>
  <script src="/crawl/static/dashboard.js"></script>
</body>
</html>
